<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Адмінка — Напрями роботи</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}
body{min-height:100vh;padding:44px;color:white;background:linear-gradient(135deg,#0f172a 0%,#1d4ed8 45%,#7c3aed 100%)}
.container{max-width:1250px;margin:auto}
h1{font-size:44px;margin-bottom:28px}
h2{font-size:26px;margin:26px 0 16px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:30px;backdrop-filter:blur(18px);margin-bottom:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.full{grid-column:1/-1}
input,textarea,select{width:100%;padding:15px 16px;border:none;border-radius:15px;background:rgba(255,255,255,.10);color:white;outline:none;font-size:15px}
option{color:#111}
textarea{min-height:100px;resize:vertical}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.55)}
button{border:none;border-radius:16px;padding:14px 20px;font-weight:800;cursor:pointer;color:white;background:#3b82f6}
.save-btn{width:100%;height:58px;margin-top:20px;font-size:17px;background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.delete-btn{background:#ef4444}
.edit-btn{background:#f59e0b}
.message{margin-top:16px;opacity:.85}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px}
.item-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);border-radius:24px;overflow:hidden}
.item-card img{width:100%;height:180px;object-fit:cover;display:block}
.item-body{padding:18px}
.item-body h3{font-size:22px;margin-bottom:8px}
.item-body p{opacity:.8;line-height:1.5;margin-bottom:8px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.badge{padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.12);font-size:13px;font-weight:700}
.actions{display:flex;gap:10px;margin-top:14px}
@media(max-width:850px){.form-grid{grid-template-columns:1fr}.full{grid-column:auto}body{padding:24px}}
</style>
</head>

<body>

<div class="container">

<h1>Адмінка — Напрями роботи</h1>

<div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
<a class="btn btn-ghost" href="admin-dashboard.html">← До дашборду</a>
</div>

<div class="card">
<h2>Налаштування сторінки</h2>

<form id="pageForm">
<div class="form-grid">

<input name="hero_pill" placeholder="Плашка">
<input name="hero_title" placeholder="Заголовок hero">

<textarea class="full" name="hero_description" placeholder="Опис hero"></textarea>

<input name="hero_primary_text" placeholder="Текст кнопки 1">
<input name="hero_primary_url" placeholder="URL кнопки 1">

<input name="hero_secondary_text" placeholder="Текст кнопки 2">
<input name="hero_secondary_url" placeholder="URL кнопки 2">

<input name="section_title" placeholder="Заголовок секції напрямів">
<input name="section_description" placeholder="Опис секції напрямів">

<input name="cta_title" placeholder="Заголовок CTA">
<textarea class="full" name="cta_text" placeholder="Текст CTA"></textarea>

<input name="cta_button_text" placeholder="Текст кнопки CTA">
<input name="cta_button_url" placeholder="URL кнопки CTA">

</div>

<button class="save-btn" type="submit">Зберегти сторінку</button>
<p id="pageMessage" class="message"></p>
</form>
</div>


<div class="card">
<h2>Додати / редагувати напрям</h2>

<form id="directionForm" enctype="multipart/form-data">
<input type="hidden" name="id">

<div class="form-grid">

<input name="title" placeholder="Назва напряму" required>
<input name="slug" placeholder="slug">

<textarea class="full" name="short_description" placeholder="Короткий опис"></textarea>
<textarea class="full" name="full_description" placeholder="Повний опис"></textarea>

<input name="icon" placeholder="Іконка / emoji">
<input name="category" placeholder="Категорія">

<input name="link_text" placeholder="Текст посилання">
<input name="link_url" placeholder="URL посилання">

<input type="number" name="sort_order" placeholder="Порядок" value="0">

<select name="is_published">
<option value="true">Опубліковано</option>
<option value="false">Чернетка</option>
</select>

<input class="full" type="file" name="cover" accept="image/*">

</div>

<button class="save-btn" type="submit">Зберегти напрям</button>
<p id="itemMessage" class="message"></p>
</form>
</div>


<div class="card">
<h2>Список напрямів</h2>
<div id="itemsList" class="items-grid"></div>
</div>

</div>

<script>
const API = "/api/directions";

const pageForm = document.getElementById("pageForm");
const directionForm = document.getElementById("directionForm");
const pageMessage = document.getElementById("pageMessage");
const itemMessage = document.getElementById("itemMessage");
const itemsList = document.getElementById("itemsList");

let editingId = null;

async function loadAdmin(){
const response = await fetch(API + "/admin");
const data = await response.json();

const page = data.page || {};

for(const key in page){
if(pageForm.elements[key]){
pageForm.elements[key].value = page[key] || "";
}
}

itemsList.innerHTML = (data.directions || []).map(item => `
<div class="item-card">

<img
src="${item.cover_image_url ? "http://localhost:5000" + item.cover_image_url : "team-placeholder.avif"}"
alt="${item.title}"
>

<div class="item-body">
<h3>${item.icon || ""} ${item.title}</h3>
<p>${item.short_description || ""}</p>

<div class="badges">
${item.category ? `<span class="badge">${item.category}</span>` : ""}
${item.is_published ? `<span class="badge">опубліковано</span>` : `<span class="badge">чернетка</span>`}
</div>

<div class="actions">
<button class="edit-btn" type="button" onclick='editItem(${JSON.stringify(item)})'>Редагувати</button>
<button class="delete-btn" type="button" onclick="deleteItem('${item.id}')">Видалити</button>
</div>

</div>
</div>
`).join("");
}

pageForm.addEventListener("submit", async e => {
e.preventDefault();

pageMessage.textContent = "Збереження...";

const data = Object.fromEntries(new FormData(pageForm));

try{
const response = await fetch(API + "/page", {
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result = await response.json();

if(!response.ok){
throw new Error(result.error || "Помилка");
}

pageMessage.textContent = "Сторінку збережено";
await loadAdmin();

}catch(error){
pageMessage.textContent = "Помилка: " + error.message;
}
});

directionForm.addEventListener("submit", async e => {
e.preventDefault();

itemMessage.textContent = "Збереження...";

const formData = new FormData(directionForm);

const method = editingId ? "PUT" : "POST";
const url = editingId ? API + "/" + editingId : API;

try{
const response = await fetch(url, {
method,
body:formData
});

const result = await response.json();

if(!response.ok){
throw new Error(result.error || "Помилка");
}

itemMessage.textContent = "Напрям збережено";
directionForm.reset();
editingId = null;

await loadAdmin();

}catch(error){
itemMessage.textContent = "Помилка: " + error.message;
}
});

function editItem(item){
editingId = item.id;

directionForm.elements.id.value = item.id || "";
directionForm.elements.title.value = item.title || "";
directionForm.elements.slug.value = item.slug || "";
directionForm.elements.short_description.value = item.short_description || "";
directionForm.elements.full_description.value = item.full_description || "";
directionForm.elements.icon.value = item.icon || "";
directionForm.elements.category.value = item.category || "";
directionForm.elements.link_text.value = item.link_text || "";
directionForm.elements.link_url.value = item.link_url || "";
directionForm.elements.sort_order.value = item.sort_order || 0;
directionForm.elements.is_published.value = item.is_published ? "true" : "false";

window.scrollTo({top:0,behavior:"smooth"});
}

async function deleteItem(id){
if(!confirm("Видалити напрям?")){
return;
}

await fetch(API + "/" + id, {
method:"DELETE"
});

await loadAdmin();
}

loadAdmin();
</script>

</body>
</html>
