<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<title>Адмінка — Новини</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

form{
background:rgba(255,255,255,.06);
padding:24px;
border-radius:24px;
margin-bottom:32px;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:16px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
box-sizing:border-box;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

.save-btn{
background:#38bdf8;
color:white;
}

.edit-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.news-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:rgba(255,255,255,.06);
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.card-body{
padding:18px;
}

.actions{
display:flex;
gap:10px;
margin-top:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>📰 Адмінка — Новини</h1>

<form
id="newsForm"
enctype="multipart/form-data"
>

<input
type="hidden"
name="id"
id="newsId"
>

<input
name="title"
id="title"
placeholder="Заголовок"
required
>

<input
name="slug"
id="slug"
placeholder="slug"
required
>

<textarea
name="excerpt"
id="excerpt"
placeholder="Короткий опис"
></textarea>

<textarea
name="content"
id="content"
placeholder="Повний текст"
></textarea>

<select
name="status"
id="status"
>
<option value="draft">Чернетка</option>
<option value="published">Опубліковано</option>
</select>

<input
type="file"
name="cover"
id="cover"
accept="image/*"
>

<button
type="submit"
class="save-btn"
>
Зберегти
</button>

</form>

<div
id="newsList"
class="news-grid"
></div>

</div>

<script>
const API =
'/api/news';

let editingId = null;

async function loadNews(){

const res =
await fetch(API);

const data =
await res.json();

newsList.innerHTML =
data.map(item=>`

<div class="card">

<img
src="${
item.cover_image_url
? item.cover_image_url
: 'team-placeholder.avif'
}"
>

<div class="card-body">

<h3>${item.title}</h3>

<p>${item.excerpt || ''}</p>

<p>${item.status}</p>

<div class="actions">

<button
class="edit-btn"
onclick='editNews(${JSON.stringify(item)})'
>
Редагувати
</button>

<button
class="delete-btn"
onclick="deleteNews('${item.id}')"
>
Видалити
</button>

</div>

</div>

</div>

`).join('');
}

function editNews(item){

editingId = item.id;

document.getElementById(
'newsId'
).value = item.id;

document.getElementById(
'title'
).value = item.title || '';

document.getElementById(
'slug'
).value = item.slug || '';

document.getElementById(
'excerpt'
).value = item.excerpt || '';

document.getElementById(
'content'
).value = item.content || '';

document.getElementById(
'status'
).value = item.status || 'draft';

window.scrollTo({
top:0,
behavior:'smooth'
});
}

async function deleteNews(id){

await fetch(
API+'/'+id,
{
method:'DELETE'
}
);

loadNews();
}

newsForm.onsubmit =
async e=>{

e.preventDefault();

const formData =
new FormData(e.target);

const method =
editingId
? 'PUT'
: 'POST';

const url =
editingId
? API+'/'+editingId
: API;

await fetch(
url,
{
method,
body:formData
}
);

e.target.reset();

editingId = null;

loadNews();
};

loadNews();
</script>

</body>
</html>
