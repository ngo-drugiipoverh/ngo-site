<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Вхід в адмінку</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,Arial,sans-serif;
}

body{
min-height:100vh;
display:grid;
place-items:center;
padding:24px;
color:white;
background:
radial-gradient(circle at top right,rgba(124,58,237,.35),transparent 35%),
linear-gradient(135deg,#0f172a,#1d4ed8 50%,#7c3aed);
}

.auth-card{
width:100%;
max-width:450px;
padding:36px;
border-radius:32px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.14);
backdrop-filter:blur(18px);
box-shadow:0 24px 80px rgba(0,0,0,.25);
}

.logo{
width:58px;
height:58px;
border-radius:18px;
background:linear-gradient(135deg,#f6df8b,#d7b64f);
margin-bottom:22px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

p{
opacity:.78;
line-height:1.5;
margin-bottom:26px;
}

form{
display:grid;
gap:14px;
}

label span{
display:block;
margin-bottom:8px;
font-weight:700;
opacity:.9;
}

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.11);
color:white;
font-size:15px;
}

input::placeholder{
color:rgba(255,255,255,.55);
}

button{
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#60a5fa,#3b82f6);
color:white;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(59,130,246,.35);
}

.message{
margin-top:16px;
min-height:22px;
opacity:.95;
}
</style>
</head>

<body>

<main class="auth-card">

<div class="logo"></div>

<h1>Вхід в адмінку</h1>

<p>
Увійди, щоб керувати сторінками, командою, проєктами та заявками.
</p>

<form id="loginForm">

<label>
<span>Email</span>
<input
type="email"
name="email"
placeholder="admin@gmail.com"
required
>
</label>

<label>
<span>Пароль</span>
<input
type="password"
name="password"
placeholder="••••••••"
required
>
</label>

<button type="submit">
Увійти
</button>

</form>

<p id="loginMessage" class="message"></p>

</main>

<script>
const form =
document.getElementById("loginForm");

const message =
document.getElementById("loginMessage");

form.addEventListener("submit", async e => {
e.preventDefault();

message.textContent =
"Вхід...";

const data =
Object.fromEntries(
new FormData(form)
);

try{

const response =
await fetch(
"http://localhost:5000/api/admin/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

const result =
await response.json();

if(!response.ok){
throw new Error(result.error || "Помилка входу");
}

localStorage.setItem(
"isAdmin",
"true"
);

localStorage.setItem(
"adminEmail",
result.admin.email
);

window.location.href =
"admin-dashboard.html";

}catch(error){

message.textContent =
"Помилка: " + error.message;

}
});
</script>

</body>
</html>
